<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartDocAI - Projects</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="brand">SmartDocAI</div>
    <div class="nav-right">
        <span>Welcome, <span id="loggedInUserName"></span></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="api.html">API Documentation</a>
        <a href="database.html">Database Schema</a>
        <a href="technical.html">Technical Info</a>
        <a href="generate.html">Generate Docs</a>
        <a href="documentation.html">Documentation</a>
    </div>

    <div class="main-content">
        <div class="page-title">Project Management</div>

        <div id="formMessage"></div>

        <div class="form-box">
            <h3 id="formHeading">Add New Project</h3>
            <input type="hidden" id="projectId">

            <div class="form-group">
                <label for="projectName">Project Name</label>
                <input type="text" id="projectName" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description"></textarea>
            </div>

            <div class="form-group">
                <label for="technology">Technology</label>
                <input type="text" id="technology" placeholder="e.g. Spring Boot, MySQL">
            </div>

            <div class="form-group">
                <label for="version">Version</label>
                <input type="text" id="version" placeholder="e.g. 1.0.0">
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status">
                    <option value="Planned">Planned</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="userId">User Id (owner)</label>
                <input type="number" id="userId" required>
            </div>

            <button class="btn" onclick="saveProject()">Save Project</button>
            <button class="btn btn-secondary" onclick="resetForm()">Cancel</button>
        </div>

        <h3 style="margin-bottom:10px;">All Projects</h3>
        <table>
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Technology</th>
                    <th>Version</th>
                    <th>Status</th>
                    <th>Created Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="projectsBody">
            </tbody>
        </table>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/projects.js"></script>
</body>
</html>
