<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartDocAI - API Documentation</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="brand">SmartDocAI</div>
    <div class="nav-right">
        <span>Welcome, <span id="loggedInUserName"></span></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html">Projects</a>
        <a href="api.html" class="active">API Documentation</a>
        <a href="database.html">Database Schema</a>
        <a href="technical.html">Technical Info</a>
        <a href="generate.html">Generate Docs</a>
        <a href="documentation.html">Documentation</a>
    </div>

    <div class="main-content">
        <div class="page-title">API Documentation</div>

        <div class="form-group" style="max-width:300px;">
            <label for="projectSelect">Select Project</label>
            <select id="projectSelect" onchange="loadApis()"></select>
        </div>

        <div id="formMessage"></div>

        <div class="form-box">
            <h3 id="formHeading">Add New API</h3>
            <input type="hidden" id="apiId">

            <div class="form-group">
                <label for="apiName">API Name</label>
                <input type="text" id="apiName" required>
            </div>

            <div class="form-group">
                <label for="method">Method</label>
                <select id="method">
                    <option>GET</option>
                    <option>POST</option>
                    <option>PUT</option>
                    <option>DELETE</option>
                </select>
            </div>

            <div class="form-group">
                <label for="endpoint">Endpoint</label>
                <input type="text" id="endpoint" placeholder="/projects">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description"></textarea>
            </div>

            <div class="form-group">
                <label for="requestExample">Request Example</label>
                <textarea id="requestExample"></textarea>
            </div>

            <div class="form-group">
                <label for="responseExample">Response Example</label>
                <textarea id="responseExample"></textarea>
            </div>

            <button class="btn" onclick="saveApi()">Save API</button>
            <button class="btn btn-secondary" onclick="resetForm()">Cancel</button>
        </div>

        <h3 style="margin-bottom:10px;">APIs For Selected Project</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Method</th>
                    <th>Endpoint</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="apiBody">
            </tbody>
        </table>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/api.js"></script>
</body>
</html>
