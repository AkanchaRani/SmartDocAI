<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartDocAI - Database Schema</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="brand">SmartDocAI</div>
    <div class="nav-right">
        <span>Welcome, <span id="loggedInUserName"></span></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html">Projects</a>
        <a href="api.html">API Documentation</a>
        <a href="database.html" class="active">Database Schema</a>
        <a href="technical.html">Technical Info</a>
        <a href="generate.html">Generate Docs</a>
        <a href="documentation.html">Documentation</a>
    </div>

    <div class="main-content">
        <div class="page-title">Database Schema</div>

        <div class="form-group" style="max-width:300px;">
            <label for="projectSelect">Select Project</label>
            <select id="projectSelect" onchange="loadTables()"></select>
        </div>

        <div id="formMessage"></div>

        <div class="form-box">
            <h3 id="formHeading">Add New Table</h3>
            <input type="hidden" id="tableId">

            <div class="form-group">
                <label for="tableName">Table Name</label>
                <input type="text" id="tableName" required>
            </div>

            <div class="form-group">
                <label for="columns">Columns (comma separated)</label>
                <textarea id="columns" placeholder="id, name, email"></textarea>
            </div>

            <div class="form-group">
                <label for="primaryKey">Primary Key</label>
                <input type="text" id="primaryKey" placeholder="id">
            </div>

            <div class="form-group">
                <label for="foreignKey">Foreign Key</label>
                <input type="text" id="foreignKey" placeholder="user_id -> users.id">
            </div>

            <div class="form-group">
                <label for="datatype">Datatype Info</label>
                <input type="text" id="datatype" placeholder="id: BIGINT, name: VARCHAR">
            </div>

            <button class="btn" onclick="saveTable()">Save Table</button>
            <button class="btn btn-secondary" onclick="resetForm()">Cancel</button>
        </div>

        <h3 style="margin-bottom:10px;">Tables For Selected Project</h3>
        <table>
            <thead>
                <tr>
                    <th>Table Name</th>
                    <th>Columns</th>
                    <th>Primary Key</th>
                    <th>Foreign Key</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/database.js"></script>
</body>
</html>
